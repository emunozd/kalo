services:

  kalo-postgres:
    image: postgres:16-alpine
    container_name: kalo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: America/Bogota
      PGTZ: America/Bogota
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - /var/lib/kalo/pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - kalo_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  kalo-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: kalo-api:latest
    container_name: kalo-api
    restart: unless-stopped
    depends_on:
      kalo-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@kalo-postgres:5432/${POSTGRES_DB}
      API_PORT: ${API_PORT:-8000}
      JWT_SECRET: ${JWT_SECRET}
      BREVO_API_KEY: ${BREVO_API_KEY}
      BREVO_FROM_EMAIL: ${BREVO_FROM_EMAIL}
      BREVO_FROM_NAME: ${BREVO_FROM_NAME:-KALO}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY:-}
      TZ: America/Bogota
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      - kalo_net
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M

  kalo-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    image: kalo-bot:latest
    container_name: kalo-bot
    restart: unless-stopped
    depends_on:
      kalo-postgres:
        condition: service_healthy
      kalo-api:
        condition: service_started
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      API_BASE_URL: http://kalo-api:8000
      TZ: America/Bogota
    networks:
      - kalo_net
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 32M

networks:
  kalo_net:
    driver: bridge
